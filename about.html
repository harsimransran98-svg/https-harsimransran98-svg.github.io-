<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bazozo.in | About Us</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght=400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Roboto', sans-serif; }
        body { background-color: #F8F9FA; color: #333333; display: flex; flex-direction: column; min-height: 100vh; }
        .main-container { flex: 1; max-width: 800px; width: 90%; margin: 40px auto; background: #FFFFFF; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h2 { color: #1A2B49; margin-bottom: 15px; }
        p { line-height: 1.6; margin-bottom: 15px; color: #555555; }
    </style>
</head>
<body>

    <div id="navbar-placeholder"></div>

    <main class="main-container">
        <h2>About Bazozo.in</h2>
        <p>Welcome to our custom platform. We are dedicated to delivering premium, high-quality products to our audiences worldwide.</p>
        <p>Our philosophy focuses on trusted service combined with beautiful presentation layouts.</p>
    </main>

    <div id="footer-placeholder"></div>

    <script>
        fetch('navbar.html')
            .then(res => res.text())
            .then(data => document.getElementById('navbar-placeholder').innerHTML = data);

        fetch('footer.html')
            .then(res => res.text())
            .then(data => document.getElementById('footer-placeholder').innerHTML = data);
    </script>
</body>
</html>
