<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bazozo.in | Home</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Roboto', sans-serif; }
        body { background-color: #F8F9FA; color: #333333; display: flex; flex-direction: column; min-height: 100vh; }
        
        .main-container { flex: 1; max-width: 800px; width: 90%; margin: 40px auto; background: #FFFFFF; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center; }
        .product-title { color: #1A2B49; margin-bottom: 20px; font-size: 28px; }
        .product-image-container { width: 100%; max-height: 400px; overflow: hidden; border-radius: 8px; margin-bottom: 30px; }
        .product-image { width: 100%; height: 100%; object-fit: cover; }
        .video-container { position: relative; width: 100%; padding-bottom: 56.25%; height: 0; border-radius: 8px; overflow: hidden; margin-bottom: 35px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
        .buy-button { display: inline-block; background-color: #00E5E5; color: #1A2B49; font-weight: 700; font-size: 18px; padding: 15px 40px; text-decoration: none; border-radius: 50px; text-transform: uppercase; letter-spacing: 1px; box-shadow: 0 4px 15px rgba(0, 229, 229, 0.4); transition: transform 0.2s ease; }
        .buy-button:hover { transform: translateY(-2px); }
    </style>
</head>
<body>

    <div id="navbar-placeholder"></div>

    <main class="main-container">
        <h2 class="product-title">Featured Product Showcase</h2>
        <div class="product-image-container">
            <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?auto=format&fit=crop&w=800&q=80" alt="Sample Product" class="product-image">
        </div>
        <div class="video-container">
            <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" allowfullscreen></iframe>
        </div>
        <a href="#" class="buy-button">Buy Now</a>
    </main>

    <div id="footer-placeholder"></div>

    <script>
        // Load the Menu Bar Component
        fetch('navbar.html')
            .then(res => res.text())
            .then(data => document.getElementById('navbar-placeholder').innerHTML = data);

        // Load the Footer Component
        fetch('footer.html')
            .then(res => res.text())
            .then(data => document.getElementById('footer-placeholder').innerHTML = data);
    </script>
</body>
</html>
